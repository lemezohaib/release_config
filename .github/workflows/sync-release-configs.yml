name: Sync Release Configs

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-release-configs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sync device YAML files
        run: python3 .github/scripts/sync_release_configs.py

      - name: Commit changes
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync release configs with official devices"

      - name: Push changes
        run: git push
